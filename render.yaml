services:
  - type: web
    name: rugby-manager-back
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py migrate"
    startCommand: "gunicorn core.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rugby-db
          property: connectionString
      - key: DEBUG
        value: "False"